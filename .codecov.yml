# .codecov.yml — fsm-tools
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 80%
        threshold: 1%
        branches:
          - master
          - "staging/*"
    patch:
      default:
        target: 80%

comment:
  layout: "reach,diff,flags,components"
  behavior: default
  require_changes: false

component_management:
  default_rules:
    statuses:
      - type: project
        target: 80%
        threshold: 1%
  individual_components:
    - component_id: automaton
      name: "Automaton (base)"
      paths:
        - src/fsm_tools/advanced.py
    - component_id: extended
      name: "Extended automata"
      paths:
        - src/fsm_tools/extended.py
    - component_id: exceptions
      name: "Exceptions"
      paths:
        - src/fsm_tools/exception.py
    - component_id: utils
      name: "Utilities"
      paths:
        - src/fsm_tools/utils/

ignore:
  - "src/fsm_tools/__init__.py"
  - "tests/**"
