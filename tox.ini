[tox]
min_version = 4.0
requires =
    tox-uv
envlist =
    lint
    type
    py310
    py311
    py312

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312

[testenv]
runner = uv-venv-runner
deps =
    pytest
    pytest-cov
allowlist_externals =
    pytest
commands =
    pytest --cov=fsm_tools --cov-report=term-missing --cov-report=xml {posargs}

[testenv:lint]
description = Lint and format check with Ruff
runner = uv-venv-runner
deps =
    ruff
allowlist_externals =
    ruff
commands =
    ruff check src/ tests/

[testenv:type]
description = Type checking with MyPy
runner = uv-venv-runner
deps =
    mypy
allowlist_externals =
    mypy
commands =
    mypy src/fsm_tools
