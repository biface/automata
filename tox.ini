[tox]
min_version = 4.0
requires =
    tox-uv
envlist =
    lint
    type
    py310
    py311
    py312
    py313
    py314
toxworkdir = {toxinidir}/.tox

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

# ============================================================================
# ENVIRONNEMENT DE BASE — tests
# ============================================================================

[testenv]
runner = uv-venv-runner
deps =
    -r {toxinidir}/.tox-config/requirements/base.txt
allowlist_externals =
    pytest
commands =
    pytest --import-mode=importlib \
        --cov \
        --cov-report=term-missing \
        {posargs}

[testenv:py310]
basepython = python3.10

[testenv:py311]
basepython = python3.11

[testenv:py312]
basepython = python3.12

[testenv:py313]
basepython = python3.13

[testenv:py314]
basepython = python3.14

# ============================================================================
# OUTILS DE VÉRIFICATION
# ============================================================================

[testenv:lint]
description = Lint and format check with Ruff
runner = uv-venv-runner
deps =
    -r {toxinidir}/.tox-config/requirements/linter.txt
allowlist_externals =
    ruff
commands =
    ruff check src/ tests/

[testenv:type]
description = Type checking with MyPy
runner = uv-venv-runner
deps =
    -r {toxinidir}/.tox-config/requirements/type-check.txt
allowlist_externals =
    mypy
commands =
    mypy src/fsm_tools

# ============================================================================
# COUVERTURE
# ============================================================================

[testenv:coverage]
description = Generate coverage report
runner = uv-venv-runner
basepython = python3.12
deps =
    -r {toxinidir}/.tox-config/requirements/base.txt
allowlist_externals =
    pytest
    mkdir
commands =
    mkdir -p {toxinidir}/coverage
    pytest --import-mode=importlib \
        --cov \
        --cov-append \
        --cov-report=term-missing \
        --cov-report=xml:{toxinidir}/coverage/coverage.xml \
        --cov-report=html:{toxinidir}/coverage/coverage_html \
        {posargs}

# ============================================================================
# WORKFLOW CI/CD (GITHUB ACTIONS)
# ============================================================================

[testenv:ci-quality]
description = CI quality checks — lint + type (no auto-fix)
runner = uv-venv-runner
deps =
    -r {toxinidir}/.tox-config/requirements/linter.txt
#    -r {toxinidir}/.tox-config/requirements/type-check.txt  # waiting v0.0.5
allowlist_externals =
    ruff
#    mypy # waiting v0.0.5
commands =
    ruff check src/ tests/
#    mypy src/fsm_tools # waiting 0.0.5

[testenv:ci-tests]
description = CI tests with coverage (used by gh-actions matrix)
runner = uv-venv-runner
deps =
    -r {toxinidir}/.tox-config/requirements/base.txt
allowlist_externals =
    pytest
commands =
    pytest --import-mode=importlib \
        --cov=fsm_tools \
        --cov-append \
        --cov-report=term-missing \
        --cov-report=xml:{toxinidir}/coverage.xml \
        {posargs}

# ============================================================================
# WORKFLOW LOCAL (AVANT PUSH)
# ============================================================================

[testenv:pre-push]
description = Complete local workflow before push (quality + tests + coverage)
runner = uv-venv-runner
deps =
    -r {toxinidir}/.tox-config/requirements/full.txt
allowlist_externals =
    ruff
    mypy
    bash
passenv =
    HOME
    USER
commands =
    ruff check src/ tests/
    mypy src/fsm_tools
    bash {toxinidir}/.tox-config/scripts/test.sh
    bash {toxinidir}/.tox-config/scripts/coverage.sh

[testenv:test]
description = Run tests sequentially on all Python versions
runner = uv-venv-runner
deps =
    -r {toxinidir}/.tox-config/requirements/full.txt
allowlist_externals =
    bash
passenv =
    HOME
    USER
commands =
    bash {toxinidir}/.tox-config/scripts/test.sh

# ============================================================================
# CONFIGURATION DES OUTILS
# ============================================================================

[mypy]
python_version = 3.10
warn_return_any = true
warn_unused_configs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
