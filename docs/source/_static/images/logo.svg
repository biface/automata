<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fsm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
    
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#ffffff" />
    </marker>
  </defs>
  
  <!-- Hexagonal badge (common element) -->
  <polygon points="150,20 250,75 250,185 150,240 50,185 50,75" 
           fill="url(#fsm-bg)" 
           stroke="#9333ea" 
           stroke-width="4"
           filter="url(#shadow)"/>
  
  <!-- Inner hexagon border -->
  <polygon points="150,35 235,82.5 235,177.5 150,225 65,177.5 65,82.5" 
           fill="none" 
           stroke="#c084fc" 
           stroke-width="2"
           opacity="0.5"/>
  
  <!-- Finite State Machine diagram -->
  <g>
    <!-- States -->
    <!-- S0 (initial state) -->
    <circle cx="95" cy="120" r="22" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="95" cy="120" r="18" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="95" y="127" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">S₀</text>
    
    <!-- S1 -->
    <circle cx="150" cy="80" r="22" fill="none" stroke="#ffffff" stroke-width="3"/>
    <text x="150" y="87" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">S₁</text>
    
    <!-- S2 (final state) -->
    <circle cx="205" cy="120" r="22" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="205" cy="120" r="18" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="205" y="127" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">S₂</text>
    
    <!-- S3 -->
    <circle cx="150" cy="160" r="22" fill="none" stroke="#ffffff" stroke-width="3"/>
    <text x="150" y="167" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">S₃</text>
    
    <!-- Transitions with arrows -->
    <!-- S0 to S1 -->
    <path d="M 108 106 L 137 88" fill="none" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    <text x="120" y="92" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff">a</text>
    
    <!-- S1 to S2 -->
    <path d="M 170 90 L 190 108" fill="none" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    <text x="183" y="95" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff">b</text>
    
    <!-- S2 to S3 -->
    <path d="M 192 134 L 163 152" fill="none" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    <text x="183" y="150" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff">c</text>
    
    <!-- S3 to S0 -->
    <path d="M 137 152 L 108 134" fill="none" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    <text x="118" y="150" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff">d</text>
    
    <!-- Self-loop on S1 -->
    <path d="M 160 63 Q 180 50 170 70" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="173" y="55" font-family="monospace" font-size="11" font-weight="bold" fill="#ffffff">ε</text>
    
    <!-- Initial arrow -->
    <path d="M 50 120 L 70 120" fill="none" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Project name -->
  <text x="150" y="210" 
        font-family="'Courier New', monospace" 
        font-size="24" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle">fsm</text>
  
  <!-- Tools badge (common element) -->
  <rect x="110" y="250" width="80" height="30" rx="15" fill="#7e22ce" stroke="#c084fc" stroke-width="2"/>
  <text x="150" y="270" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle">tools</text>
</svg>
