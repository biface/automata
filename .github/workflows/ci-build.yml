name: Python CI - Build

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"          # final release:      v0.1.0
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"  # release candidate:  v0.1.0rc1

jobs:
  build:
    name: Verify version and build package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install build dependencies
        run: uv pip install --system packaging

      - name: Verify version consistency
        id: version
        run: |
          python - <<'EOF'
          import sys, re, os, tomllib
          from pathlib import Path
          from packaging import version as pkg_version

          # Version from git tag (strip leading 'v')
          tag = os.environ["GITHUB_REF_NAME"]
          tag_version = tag.lstrip("v")

          # Version from pyproject.toml
          with open("pyproject.toml", "rb") as f:
              pyproject_version = tomllib.load(f)["project"]["version"]

          # Version from __init__.py
          init_files = list(Path("src").rglob("__init__.py"))
          init_version = None
          for init_file in init_files:
              match = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', init_file.read_text())
              if match:
                  init_version = match.group(1)
                  break

          print(f"Tag version:    {tag_version}")
          print(f"pyproject.toml: {pyproject_version}")
          print(f"__init__.py:    {init_version}")

          errors = []
          if pkg_version.parse(tag_version) != pkg_version.parse(pyproject_version):
              errors.append(f"Tag ({tag_version}) does not match pyproject.toml ({pyproject_version})")
          if init_version and pkg_version.parse(tag_version) != pkg_version.parse(init_version):
              errors.append(f"Tag ({tag_version}) does not match __init__.py ({init_version})")

          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={tag_version}\n")
              f.write(f"tag={tag}\n")

          print(f"✅ All versions consistent: {tag_version}")
          EOF
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Build package
        run: |
          uv build
          echo "✅ Build completed"
          ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 7

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
