name: "ЁЯФз Maintenance"
description: >
  Technical task with no new feature: docs, refactoring,
  tests, CI/CD, performance, deprecation.
title: "[MAINT] "
labels:
  - "status: triage"

body:
  - type: dropdown
    id: maint-type
    attributes:
      label: "Task type"
      description: >
        Select the primary type, then replace `status: triage`
        with the matching `type:` label after creation.
      options:
        - "chore       тАФ dependencies, housekeeping, configuration"
        - "docs        тАФ docstrings, Sphinx, README, guides, examples"
        - "test        тАФ adding or fixing tests, coverage"
        - "refactor    тАФ restructuring without behaviour change"
        - "ci          тАФ tox, GitHub Actions, pipeline config"
        - "perf        тАФ performance optimisation"
        - "deprecation тАФ mark obsolete code with deprecation warnings"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "What needs to be done, and why now?"
      placeholder: >
        Fix `TuringMachine._extend_tape` тАФ the method body is currently empty,
        causing the head to be unable to move beyond initial tape content.
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: "Completion criteria"
      description: "Objective conditions to close this issue."
      placeholder: |
        - [ ] `pytest --tb=short` passes
        - [ ] `tox -e ci-quality`: 0 errors
        - [ ] Coverage тЙе 80%
        - [ ] `CHANGELOG.md` updated if necessary
      render: markdown
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: "Urgency (optional)"
      description: >
        Why this task now rather than later?
        E.g.: blocking technical debt, prerequisite for a milestone.
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: "Affected scopes"
      description: "Apply the matching `scope:` labels manually after creation."
      options:
        - label: "`api` тАФ public interface"
        - label: "`docs` тАФ docstrings, Sphinx, guides"
        - label: "`tests` тАФ pytest, coverage"
        - label: "`ci` тАФ tox, GitHub Actions, pipeline"
        - label: "`ui` тАФ error messages, output formatting"

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "Apply the matching `priority:` label after creation."
      options:
        - "none тАФ someday, out of sprint"
        - "low тАФ before the next minor version"
        - "medium тАФ in the target version"
        - "high тАФ blocks the release or CI"
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: "Estimated effort"
      description: "Apply the matching `effort:` label after creation."
      options:
        - "XS тАФ < 1 h"
        - "S  тАФ half-day"
        - "M  тАФ 1 day"
        - "L  тАФ 2тАУ3 days"
        - "XL тАФ > 3 days"
    validations:
      required: true

  - type: dropdown
    id: ecosystem
    attributes:
      label: "Ecosystem layer"
      description: "Apply the matching `ecosystem:` label after creation."
      options:
        - "language тАФ Python idioms, typing"
        - "framework тАФ library or framework architecture"
        - "ops тАФ PyPI publishing, packaging"
        - "pipeline тАФ tox, GitHub Actions, CI tooling"
    validations:
      required: false
